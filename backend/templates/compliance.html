<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AtomicPay Compliance</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
body { display: block; }
.dashboard { max-width: 1280px; margin: 0 auto; padding: 24px; }
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--bdr); }
.dash-header h1 { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; letter-spacing: -.02em; }
.dash-header h1 span { font-size: 28px; }
.dash-nav { display: flex; gap: 8px; flex-wrap: wrap; }
.dash-nav a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; padding: 8px 16px; border: 1px solid var(--bdr); border-radius: 20px; transition: all .2s; }
.dash-nav a:hover { color: var(--accent2); border-color: var(--accent); }
.section { margin-bottom: 28px; }
.section h2 { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: .05em; margin-bottom: 14px; text-transform: uppercase; }
.data-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--bdr); }
.data-table th { background: var(--sur); color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; padding: 12px 16px; text-align: left; }
.data-table td { padding: 12px 16px; font-size: 13px; border-top: 1px solid var(--bdr); }
.data-table tr:hover td { background: rgba(99,102,241,.02); }
.scroll-box { max-height: 400px; overflow-y: auto; }
.scroll-box::-webkit-scrollbar { width: 4px; }
.scroll-box::-webkit-scrollbar-thumb { background: var(--bdr2); border-radius: 2px; }
.tab-bar { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-btn { padding: 10px 20px; border: 1px solid var(--bdr); border-radius: 12px; background: var(--card); color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif; }
.tab-btn:hover { border-color: var(--bdr2); color: var(--txt); }
.tab-btn.active { background: linear-gradient(135deg, var(--gold), #d97706); color: #000; border-color: var(--gold); box-shadow: 0 4px 12px rgba(245,158,11,.3); }
.tab-panel { display: none; animation: screenIn .3s ease; }
.tab-panel.active { display: block; }
.action-btn { padding: 6px 14px; border: 1px solid var(--bdr); border-radius: var(--radius-xs); background: var(--card); color: var(--txt); font-size: 12px; font-weight: 500; cursor: pointer; margin-right: 6px; transition: all .2s; font-family: 'Inter', sans-serif; }
.action-btn:hover { border-color: var(--accent); }
.action-btn.approve { color: var(--green); border-color: rgba(34,197,94,.3); background: var(--green-bg); }
.action-btn.approve:hover { background: rgba(34,197,94,.15); }
.action-btn.reject { color: var(--red); border-color: rgba(239,68,68,.3); background: var(--red-bg); }
.action-btn.reject:hover { background: rgba(239,68,68,.15); }
.risk-high { color: var(--red); font-weight: 700; }
.risk-med { color: var(--gold); font-weight: 700; }
.risk-low { color: var(--green); }
.report-card { background: var(--card); border: 1px solid var(--bdr); border-radius: var(--radius); padding: 24px; margin-bottom: 18px; }
.report-card h3 { font-size: 16px; font-weight: 700; color: var(--accent2); margin-bottom: 16px; }
.report-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--bdr); }
.report-label { color: var(--muted); }
.report-value { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.login-card { max-width: 400px; margin: 80px auto; padding: 36px; background: var(--card); border: 1px solid var(--bdr); border-radius: 20px; box-shadow: var(--shadow-lg); }
.login-card h2 { text-align: center; margin-bottom: 24px; font-size: 20px; font-weight: 700; }
</style>
</head>
<body>
<div class="dashboard" id="loginView">
  <div class="login-card">
    <div style="text-align:center;font-size:36px;margin-bottom:12px">&#128737;</div>
    <h2>Compliance Dashboard</h2>
    <div class="err" id="cErr"></div>
    <div class="fbody" style="padding:0">
      <div class="field">
        <div class="flbl">Mobile</div>
        <input class="fi mono" type="tel" id="cMob" value="0000000000">
      </div>
      <div class="field">
        <div class="flbl">PIN</div>
        <input class="fi mono" type="password" id="cPin" value="admin123">
      </div>
      <button class="btn btn-p" onclick="cLogin()">Sign In</button>
    </div>
  </div>
</div>

<div class="dashboard" id="dashView" style="display:none">
  <div class="dash-header">
    <h1><span>&#128737;</span> Compliance Dashboard</h1>
    <div class="dash-nav">
      <a href="/">App</a>
      <a href="/portal/admin">Admin</a>
      <a href="/portal/developer">Developer</a>
      <a href="#" onclick="cLogout()" style="color:var(--red);border-color:rgba(239,68,68,.2)">Logout</a>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="cTab('aml')">AML Alerts</button>
    <button class="tab-btn" onclick="cTab('fraud')">Fraud Flags</button>
    <button class="tab-btn" onclick="cTab('kyc')">KYC Records</button>
    <button class="tab-btn" onclick="cTab('reports')">Reports</button>
  </div>

  <div class="tab-panel active" id="tab-aml">
    <div class="section">
      <h2>Anti-Money Laundering Alerts</h2>
      <div class="scroll-box"><table class="data-table" id="amlTable"><tr><td>Loading...</td></tr></table></div>
    </div>
  </div>

  <div class="tab-panel" id="tab-fraud">
    <div class="section">
      <h2>Fraud Detection Flags</h2>
      <div class="scroll-box"><table class="data-table" id="fraudTable"><tr><td>Loading...</td></tr></table></div>
    </div>
  </div>

  <div class="tab-panel" id="tab-kyc">
    <div class="section">
      <h2>KYC Verification Queue</h2>
      <div class="scroll-box"><table class="data-table" id="kycTable"><tr><td>Loading...</td></tr></table></div>
    </div>
  </div>

  <div class="tab-panel" id="tab-reports">
    <div class="section">
      <h2>Regulatory Reports</h2>
      <div id="reportContent">Loading...</div>
    </div>
  </div>
</div>

<script>
let CT = localStorage.getItem('ap_comp_token') || '';

async function capi(path, data, method) {
  const opts = { headers: { 'Authorization': 'Bearer ' + CT } };
  if (data) { opts.method = method || 'POST'; opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(data); }
  else { opts.method = method || 'GET'; }
  const r = await fetch('/api' + path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Error'); }
  return r.json();
}

function cTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`#tab-${tab}`).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'aml') loadAML();
  if (tab === 'fraud') loadFraud();
  if (tab === 'kyc') loadKYC();
  if (tab === 'reports') loadReport();
}

async function cLogin() {
  try {
    const r = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mobile: document.getElementById('cMob').value, pin: document.getElementById('cPin').value })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'Failed');
    if (data.role !== 'admin') throw new Error('Admin access required');
    CT = data.token; localStorage.setItem('ap_comp_token', CT); showDash();
  } catch (e) {
    const err = document.getElementById('cErr'); err.textContent = e.message; err.style.display = 'block';
  }
}

function cLogout() { CT = ''; localStorage.removeItem('ap_comp_token'); location.reload(); }

function showDash() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('dashView').style.display = 'block';
  loadAML();
}

function riskClass(s) { return s >= 0.7 ? 'risk-high' : s >= 0.4 ? 'risk-med' : 'risk-low'; }

async function loadAML() {
  try {
    const alerts = await capi('/compliance/aml_alerts');
    const t = document.getElementById('amlTable');
    t.innerHTML = '<tr><th>ID</th><th>User</th><th>TX</th><th>Risk</th><th>Reason</th><th>Status</th><th>Actions</th></tr>';
    if (!alerts.length) { t.innerHTML += '<tr><td colspan="7" style="color:var(--green);text-align:center;padding:24px">No AML alerts \u2014 All clear</td></tr>'; return; }
    alerts.forEach(a => {
      const statusClass = a.status === 'open' ? 'rajas' : a.status === 'resolved' ? 'sattva' : 'tamas';
      t.innerHTML += `<tr>
        <td style="font-weight:600">#${a.id}</td>
        <td>User ${a.user_id}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${(a.tx_id||'').substring(0,8)}</td>
        <td class="${riskClass(a.risk_score)}">${a.risk_score}</td>
        <td style="font-size:12px">${a.reason}</td>
        <td><span class="state-badge ${statusClass}">${a.status}</span></td>
        <td>${a.status === 'open' ? `<button class="action-btn approve" onclick="amlAction(${a.id},'resolved')">Resolve</button><button class="action-btn reject" onclick="amlAction(${a.id},'dismissed')">Dismiss</button>` : ''}</td>
      </tr>`;
    });
  } catch(e) {}
}

async function amlAction(id, action) {
  try { await capi('/compliance/aml_action', { alert_id: id, action }); loadAML(); } catch(e) { alert(e.message); }
}

async function loadFraud() {
  try {
    const flags = await capi('/compliance/fraud_flags');
    const t = document.getElementById('fraudTable');
    t.innerHTML = '<tr><th>ID</th><th>User</th><th>TX</th><th>Risk Score</th><th>Type</th><th>Time</th></tr>';
    if (!flags.length) { t.innerHTML += '<tr><td colspan="6" style="color:var(--green);text-align:center;padding:24px">No fraud flags \u2014 All clear</td></tr>'; return; }
    flags.forEach(f => {
      t.innerHTML += `<tr>
        <td style="font-weight:600">#${f.id}</td>
        <td>User ${f.user_id}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${(f.tx_id||'').substring(0,8)||'\u2014'}</td>
        <td class="${riskClass(f.risk_score)}">${f.risk_score}</td>
        <td>${f.flag_type}</td>
        <td style="font-size:11px;color:var(--muted)">${f.created_at ? new Date(f.created_at).toLocaleString() : ''}</td>
      </tr>`;
    });
  } catch(e) {}
}

async function loadKYC() {
  try {
    const records = await capi('/compliance/kyc_records');
    const t = document.getElementById('kycTable');
    t.innerHTML = '<tr><th>ID</th><th>User</th><th>Type</th><th>Number</th><th>Status</th><th>Actions</th></tr>';
    if (!records.length) { t.innerHTML += '<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:24px">No KYC records</td></tr>'; return; }
    records.forEach(r => {
      const statusClass = r.verification_status === 'verified' ? 'sattva' : r.verification_status === 'rejected' ? 'tamas' : 'rajas';
      t.innerHTML += `<tr>
        <td style="font-weight:600">#${r.id}</td>
        <td>User ${r.user_id}</td>
        <td>${r.document_type}</td>
        <td style="font-family:'JetBrains Mono',monospace">${r.document_number}</td>
        <td><span class="state-badge ${statusClass}">${r.verification_status}</span></td>
        <td>${r.verification_status === 'pending' ? `<button class="action-btn approve" onclick="kycAction(${r.id},true)">Approve</button><button class="action-btn reject" onclick="kycAction(${r.id},false)">Reject</button>` : ''}</td>
      </tr>`;
    });
  } catch(e) {}
}

async function kycAction(id, approve) {
  try { await capi('/compliance/kyc_verify', { record_id: id, approve }); loadKYC(); } catch(e) { alert(e.message); }
}

async function loadReport() {
  try {
    const r = await capi('/regulatory/reports');
    document.getElementById('reportContent').innerHTML = `
      <div class="report-card">
        <h3>RBI Sandbox Compliance Report</h3>
        <div class="report-row"><span class="report-label">Generated</span><span class="report-value">${new Date(r.generated_at).toLocaleString()}</span></div>
        <div class="report-row"><span class="report-label">Compliance Status</span><span class="report-value"><span class="state-badge ${r.compliance_status === 'COMPLIANT' ? 'sattva' : 'rajas'}">${r.compliance_status}</span></span></div>
        <div class="report-row"><span class="report-label">Total Transactions</span><span class="report-value">${r.metrics.total_transactions}</span></div>
        <div class="report-row"><span class="report-label">Success Rate</span><span class="report-value">${r.metrics.success_rate}%</span></div>
        <div class="report-row"><span class="report-label">Avg Latency</span><span class="report-value">${r.metrics.avg_latency_ms}ms</span></div>
        <div class="report-row"><span class="report-label">Open AML Alerts</span><span class="report-value">${r.aml_summary.open_alerts}</span></div>
        <div class="report-row"><span class="report-label">Total AML Alerts</span><span class="report-value">${r.aml_summary.total_alerts}</span></div>
        <div class="report-row"><span class="report-label">Pending KYC</span><span class="report-value">${r.kyc_summary.pending_verifications}</span></div>
      </div>
    `;
  } catch(e) { document.getElementById('reportContent').innerHTML = '<div style="color:var(--red)">Failed to load report</div>'; }
}

if (CT) { capi('/compliance/aml_alerts').then(() => showDash()).catch(() => cLogout()); }
</script>
</body>
</html>
